<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dark AI | Ultra</title>
    <style>
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --border: #1a1a1a;
            --gold: #c9a84c;
            --gold-light: #e2c97e;
            --gold-glow: rgba(201, 168, 76, 0.4);
            --text: #e0d5c0;
            --text-dim: #6b6355;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background-image: 
                radial-gradient(ellipse at 20% 0%, rgba(201,168,76,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(201,168,76,0.04) 0%, transparent 50%);
        }

        .app { width: 100%; max-width: 440px; }

        .header { text-align: center; margin-bottom: 20px; }

        .logo-ring { width: 80px; height: 80px; margin: 0 auto 14px; position: relative; }

        .logo-outer {
            position: absolute; inset: -6px;
            border: 2px solid rgba(201,168,76,0.2);
            border-radius: 22px;
            animation: pulse-ring 2s ease-in-out infinite;
        }

        .logo-inner {
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #000, #1a1a0a, #000);
            border: 2px solid var(--gold);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 34px;
            box-shadow: 0 0 40px var(--gold-glow), 0 0 80px rgba(201,168,76,0.1), 0 8px 30px rgba(0,0,0,0.8);
            animation: float 4s ease-in-out infinite;
            position: relative; z-index: 2;
        }

        .sparkle {
            position: absolute; width: 4px; height: 4px;
            background: var(--gold-light); border-radius: 50%;
            animation: sparkle 2s ease-in-out infinite; z-index: 3;
        }
        .sparkle:nth-child(1) { top: 8px; left: 8px; animation-delay: 0s; }
        .sparkle:nth-child(2) { top: 12px; right: 10px; animation-delay: 0.6s; }
        .sparkle:nth-child(3) { bottom: 10px; left: 14px; animation-delay: 1.2s; }
        .sparkle:nth-child(4) { bottom: 8px; right: 8px; animation-delay: 1.8s; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @keyframes pulse-ring {
            0%, 100% { transform: scale(1); opacity: 0.2; }
            50% { transform: scale(1.12); opacity: 0.5; }
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(2); }
        }

        .title {
            font-size: 34px; font-weight: 900; letter-spacing: 3px;
            background: linear-gradient(135deg, var(--gold), var(--gold-light), var(--gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 20px rgba(201,168,76,0.3));
        }

        .subtitle {
            font-size: 10px; color: var(--text-dim);
            letter-spacing: 5px; text-transform: uppercase; margin-top: 2px;
        }

        .line {
            width: 60px; height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 14px auto;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px; padding: 22px 18px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.02) inset;
            position: relative; overflow: hidden;
        }

        .card::before {
            content: ''; position: absolute; top: 0; left: 20%; right: 20%; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(201,168,76,0.5), transparent);
        }

        .styles-label {
            font-size: 9px; text-transform: uppercase; letter-spacing: 4px;
            color: var(--text-dim); margin-bottom: 10px;
        }

        .styles-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 7px; margin-bottom: 18px;
        }

        .style-btn {
            padding: 12px 6px; background: var(--bg);
            border: 1px solid var(--border); color: var(--text-dim);
            cursor: pointer; border-radius: 12px;
            font-size: 10px; font-weight: 600;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center; position: relative; overflow: hidden;
        }

        .style-btn .icon { display: block; font-size: 22px; margin-bottom: 5px; }

        .style-btn::after {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at center, rgba(201,168,76,0.1), transparent);
            opacity: 0; transition: opacity 0.3s;
        }

        .style-btn:hover { border-color: var(--gold); color: var(--gold); }
        .style-btn:hover::after { opacity: 1; }

        .style-btn.active {
            background: rgba(201,168,76,0.12);
            border-color: var(--gold); color: var(--gold);
            box-shadow: 0 0 20px var(--gold-glow), 0 0 0 2px rgba(201,168,76,0.1);
            transform: translateY(-2px);
        }

        .input-wrapper { position: relative; margin-bottom: 12px; }

        #prompt {
            width: 100%; padding: 16px 20px; padding-right: 50px;
            background: var(--bg); border: 1px solid var(--border);
            color: var(--text); font-size: 14px; border-radius: 14px;
            transition: all 0.4s; outline: none; font-family: inherit;
        }

        #prompt:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 4px var(--gold-glow), 0 0 30px rgba(201,168,76,0.1);
        }

        #prompt::placeholder { color: #3a3530; }

        .input-icon {
            position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
            font-size: 18px; opacity: 0.3; pointer-events: none;
        }

        .btn-generate {
            width: 100%; padding: 16px;
            background: linear-gradient(135deg, var(--gold), var(--gold-light), var(--gold));
            color: #000; border: none; font-weight: 900;
            cursor: pointer; border-radius: 14px;
            font-size: 14px; letter-spacing: 2px; text-transform: uppercase;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 6px 25px var(--gold-glow);
            margin-bottom: 18px; font-family: inherit;
            position: relative; overflow: hidden;
        }

        .btn-generate::before {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 0; height: 0; background: rgba(255,255,255,0.3);
            border-radius: 50%; transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn-generate:hover { transform: translateY(-3px); box-shadow: 0 12px 35px var(--gold-glow); }
        .btn-generate:hover::before { width: 300px; height: 300px; }
        .btn-generate:active { transform: scale(0.95); }

        .btn-generate:disabled {
            background: #1a1a1a; color: #333;
            box-shadow: none; cursor: not-allowed; transform: none;
        }

        .btn-generate:disabled::before { display: none; }

        .image-area { position: relative; margin-bottom: 14px; }

        .image-frame {
            width: 100%; aspect-ratio: 1;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 18px; overflow: hidden; position: relative;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.4s;
        }

        .image-frame.has-image { border-color: #333; }

        .placeholder-content { text-align: center; color: #1a1a1a; }
        .placeholder-content .icon { font-size: 56px; display: block; margin-bottom: 10px; opacity: 0.25; }
        .placeholder-content .text { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; }

        .image-frame img {
            width: 100%; height: 100%; object-fit: cover;
            display: none; transition: opacity 0.5s;
        }

        .image-frame img.show { display: block; animation: fadeIn 0.6s ease; }

        .image-frame canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; display: none;
        }

        .image-frame canvas.show { display: block; animation: fadeIn 0.6s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(1.05); }
            to { opacity: 1; transform: scale(1); }
        }

        .loading-overlay {
            display: none; position: absolute; inset: 0;
            background: rgba(0,0,0,0.92); border-radius: 18px;
            align-items: center; justify-content: center;
            flex-direction: column; gap: 16px; z-index: 10;
        }

        .loading-overlay.show { display: flex; }

        .spinner-ring {
            width: 50px; height: 50px;
            border: 2px solid var(--border);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-dots { display: flex; gap: 6px; }
        .loading-dot {
            width: 6px; height: 6px; background: var(--gold);
            border-radius: 50%; animation: bounce 1.2s ease-in-out infinite;
        }
        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); opacity: 0.3; }
            50% { transform: translateY(-12px); opacity: 1; }
        }

        .btn-download {
            display: none; width: 100%; padding: 14px;
            background: transparent; border: 2px solid var(--gold);
            color: var(--gold); cursor: pointer; border-radius: 14px;
            font-weight: 700; font-size: 13px; letter-spacing: 2px;
            text-transform: uppercase; transition: all 0.4s;
            font-family: inherit; position: relative; overflow: hidden;
        }

        .btn-download.visible { display: block; animation: slideUp 0.4s ease; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-download:hover {
            background: rgba(201,168,76,0.12);
            box-shadow: 0 0 30px var(--gold-glow);
            letter-spacing: 3px;
        }

        .btn-download:active { transform: scale(0.96); }

        .toast {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #111; border: 1px solid var(--gold);
            color: var(--gold); padding: 14px 28px;
            border-radius: 30px; font-size: 12px; letter-spacing: 2px;
            z-index: 200; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 15px 40px rgba(0,0,0,0.8), 0 0 30px var(--gold-glow);
            text-align: center;
        }

        .toast.show { transform: translateX(-50%) translateY(0); }

        .footer {
            text-align: center; margin-top: 18px;
            font-size: 9px; color: #1a1a1a; letter-spacing: 2px;
        }
        .footer span { color: var(--gold); }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="logo-ring">
                <div class="logo-outer"></div>
                <div class="logo-inner">
                    ⚡
                    <span class="sparkle"></span>
                    <span class="sparkle"></span>
                    <span class="sparkle"></span>
                    <span class="sparkle"></span>
                </div>
            </div>
            <h1 class="title">DARK AI</h1>
            <p class="subtitle">Image Generator Ultra</p>
            <div class="line"></div>
        </div>

        <div class="card">
            <p class="styles-label">✦ Select Style</p>
            <div class="styles-grid">
                <button class="style-btn active" data-style="">
                    <span class="icon">🎨</span>All
                </button>
                <button class="style-btn" data-style="dark fantasy art">
                    <span class="icon">🌑</span>Dark
                </button>
                <button class="style-btn" data-style="cyberpunk neon">
                    <span class="icon">🤖</span>Cyber
                </button>
                <button class="style-btn" data-style="anime art style">
                    <span class="icon">🌸</span>Anime
                </button>
                <button class="style-btn" data-style="photorealistic 8k">
                    <span class="icon">👤</span>Real
                </button>
                <button class="style-btn" data-style="horror dark gothic">
                    <span class="icon">💀</span>Horror
                </button>
            </div>

            <div class="input-wrapper">
                <input type="text" id="prompt" placeholder="Describe your vision..." autocomplete="off">
                <span class="input-icon">✨</span>
            </div>

            <button class="btn-generate" id="generateBtn" onclick="generateImage()">
                ✦ Generate Image ✦
            </button>

            <div class="image-area">
                <div class="image-frame" id="imageFrame">
                    <div class="placeholder-content" id="placeholder">
                        <span class="icon">🖼️</span>
                        <span class="text">Masterpiece appears here</span>
                    </div>
                    <img id="generatedImage" alt="AI Art" crossorigin="anonymous">
                    <canvas id="imageCanvas"></canvas>
                    <div class="loading-overlay" id="loadingOverlay">
                        <div class="spinner-ring"></div>
                        <div class="loading-dots">
                            <div class="loading-dot"></div>
                            <div class="loading-dot"></div>
                            <div class="loading-dot"></div>
                        </div>
                    </div>
                </div>
            </div>

            <button class="btn-download" id="downloadBtn" onclick="downloadImage()">
                ⬇ Download Image
            </button>
        </div>

        <p class="footer">Powered by <span>Pollinations.ai</span> • Free & Unlimited</p>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let currentStyle = '';
        let currentDataUrl = null;

        document.querySelectorAll('.style-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentStyle = this.dataset.style;
            });
        });

        document.getElementById('prompt').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') generateImage();
        });

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function generateImage() {
            const prompt = document.getElementById('prompt').value.trim();
            if (!prompt) {
                const input = document.getElementById('prompt');
                input.style.borderColor = '#ff4444';
                input.style.boxShadow = '0 0 15px rgba(255,0,0,0.3)';
                setTimeout(() => {
                    input.style.borderColor = '';
                    input.style.boxShadow = '';
                }, 1500);
                return;
            }

            const fullPrompt = currentStyle ? prompt + ', ' + currentStyle : prompt;
            const seed = Math.floor(Math.random() * 99999);
            const imageUrl = 'https://image.pollinations.ai/prompt/' + encodeURIComponent(fullPrompt) + '?width=512&height=512&seed=' + seed + '&nologo=true';

            const loadingOverlay = document.getElementById('loadingOverlay');
            const generatedImage = document.getElementById('generatedImage');
            const imageCanvas = document.getElementById('imageCanvas');
            const placeholder = document.getElementById('placeholder');
            const downloadBtn = document.getElementById('downloadBtn');
            const generateBtn = document.getElementById('generateBtn');
            const imageFrame = document.getElementById('imageFrame');

            loadingOverlay.classList.add('show');
            generateBtn.disabled = true;
            generatedImage.classList.remove('show');
            imageCanvas.classList.remove('show');
            placeholder.style.display = 'block';
            downloadBtn.classList.remove('visible');
            imageFrame.classList.remove('has-image');
            currentDataUrl = null;

            generatedImage.crossOrigin = 'anonymous';
            generatedImage.src = imageUrl;

            generatedImage.onload = function() {
                try {
                    const canvas = document.getElementById('imageCanvas');
                    const ctx = canvas.getContext('2d');

                    canvas.width = generatedImage.naturalWidth || 512;
                    canvas.height = generatedImage.naturalHeight || 512;

                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(generatedImage, 0, 0, canvas.width, canvas.height);

                    currentDataUrl = canvas.toDataURL('image/png');

                    imageCanvas.classList.add('show');
                    generatedImage.classList.remove('show');
                } catch (e) {
                    generatedImage.classList.add('show');
                    imageCanvas.classList.remove('show');
                    currentDataUrl = imageUrl;
                }

                loadingOverlay.classList.remove('show');
                placeholder.style.display = 'none';
                downloadBtn.classList.add('visible');
                generateBtn.disabled = false;
                imageFrame.classList.add('has-image');
            };

            generatedImage.onerror = function() {
                loadingOverlay.classList.remove('show');
                generateBtn.disabled = false;
                showToast('⚠️ Failed. Try a different prompt.');
            };
        }

        function downloadImage() {
            if (!currentDataUrl) {
                showToast('⚠️ No image to download');
                return;
            }

            const btn = document.getElementById('downloadBtn');
            btn.textContent = 'Saving...';
            btn.disabled = true;

            const filename = 'Dark-AI-' + Date.now() + '.png';

            try {
                if (currentDataUrl.startsWith('data:image/png')) {
                    const a = document.createElement('a');
                    a.href = currentDataUrl;
                    a.download = filename;
                    a.style.display = 'none';
                    document.body.appendChild(a);
                    a.click();

                    setTimeout(function() {
                        document.body.removeChild(a);
                    }, 200);

                    showToast('✅ Image saved successfully!');
                } else {
                    window.open(currentDataUrl, '_blank');
                    showToast('📤 Image opened in new tab');
                }
            } catch (e) {
                window.open(currentDataUrl, '_blank');
                showToast('📤 Long-press to save image');
            }

            btn.textContent = '⬇ Download Image';
            btn.disabled = false;
        }

        document.getElementById('generatedImage').addEventListener('contextmenu', function(e) {
            e.preventDefault();
            downloadImage();
        });
    </script>
</body>
</html>
