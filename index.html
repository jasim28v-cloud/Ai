<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dark AI Generator</title>
    <style>
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --border: #1a1a1a;
            --gold: #c9a84c;
            --gold-light: #e2c97e;
            --gold-glow: rgba(201, 168, 76, 0.3);
            --text: #e0d5c0;
            --text-dim: #6b6355;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background-image: 
                radial-gradient(ellipse at top, rgba(201,168,76,0.05) 0%, transparent 60%),
                radial-gradient(ellipse at bottom, rgba(201,168,76,0.03) 0%, transparent 60%);
        }

        .app {
            width: 100%;
            max-width: 440px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 12px;
            background: linear-gradient(135deg, var(--gold), var(--gold-light), var(--gold));
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 0 30px var(--gold-glow);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .title {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--gold), var(--gold-light), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 10px;
            color: var(--text-dim);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .line {
            width: 50px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 12px auto;
        }

        /* Card */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Styles */
        .styles-label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-dim);
            margin-bottom: 10px;
        }

        .styles-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-bottom: 16px;
        }

        .style-btn {
            padding: 10px 6px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text-dim);
            cursor: pointer;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
            transition: all 0.3s;
            text-align: center;
        }

        .style-btn .icon { display: block; font-size: 20px; margin-bottom: 4px; }

        .style-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .style-btn.active {
            background: rgba(201,168,76,0.1);
            border-color: var(--gold);
            color: var(--gold);
            box-shadow: 0 0 15px var(--gold-glow);
        }

        /* Input */
        #prompt {
            width: 100%;
            padding: 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 13px;
            border-radius: 12px;
            margin-bottom: 10px;
            transition: all 0.3s;
            outline: none;
        }

        #prompt:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px var(--gold-glow);
        }

        #prompt::placeholder { color: #3a3530; }

        /* Generate Button */
        .btn-generate {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--gold), var(--gold-light), var(--gold));
            color: #000;
            border: none;
            font-weight: 900;
            cursor: pointer;
            border-radius: 12px;
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s;
            box-shadow: 0 4px 15px var(--gold-glow);
            margin-bottom: 16px;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--gold-glow);
        }

        .btn-generate:active { transform: scale(0.98); }

        .btn-generate:disabled {
            background: #1a1a1a;
            color: #333;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* Image Area */
        .image-frame {
            width: 100%;
            aspect-ratio: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .placeholder-content {
            text-align: center;
            color: #1a1a1a;
        }

        .placeholder-content .icon {
            font-size: 50px;
            display: block;
            margin-bottom: 8px;
            opacity: 0.3;
        }

        .placeholder-content .text {
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .image-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        /* Loading */
        .loading-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.9);
            border-radius: 16px;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;
        }

        .loading-overlay.show { display: flex; }

        .spinner {
            width: 40px;
            height: 40px;
            border: 2px solid var(--border);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--gold);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Download */
        .btn-download {
            display: none;
            width: 100%;
            margin-top: 12px;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            cursor: pointer;
            border-radius: 12px;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .btn-download.visible { display: block; }

        .btn-download:hover {
            background: rgba(201,168,76,0.1);
            box-shadow: 0 0 20px var(--gold-glow);
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 16px;
            font-size: 9px;
            color: #1a1a1a;
            letter-spacing: 2px;
        }

        .footer span { color: var(--gold); }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="logo">⚡</div>
            <h1 class="title">DARK AI</h1>
            <p class="subtitle">Image Generator</p>
            <div class="line"></div>
        </div>

        <div class="card">
            <p class="styles-label">✦ Select Style</p>
            <div class="styles-grid">
                <button class="style-btn active" data-style="">
                    <span class="icon">🎨</span>All
                </button>
                <button class="style-btn" data-style="dark fantasy art">
                    <span class="icon">🌑</span>Dark
                </button>
                <button class="style-btn" data-style="cyberpunk neon">
                    <span class="icon">🤖</span>Cyber
                </button>
                <button class="style-btn" data-style="anime art style">
                    <span class="icon">🌸</span>Anime
                </button>
                <button class="style-btn" data-style="photorealistic 8k">
                    <span class="icon">👤</span>Real
                </button>
                <button class="style-btn" data-style="horror dark gothic">
                    <span class="icon">💀</span>Horror
                </button>
            </div>

            <input type="text" id="prompt" placeholder="Describe your image..." autocomplete="off">

            <button class="btn-generate" id="generateBtn" onclick="generateImage()">
                ✦ Generate ✦
            </button>

            <div class="image-frame" id="imageFrame">
                <div class="placeholder-content" id="placeholder">
                    <span class="icon">🖼️</span>
                    <span class="text">Your art appears here</span>
                </div>
                <img id="generatedImage" alt="Generated">
                <div class="loading-overlay" id="loadingOverlay">
                    <div class="spinner"></div>
                    <span class="loading-text">Creating...</span>
                </div>
            </div>

            <button class="btn-download" id="downloadBtn" onclick="downloadImage()">
                ⬇ Save Image
            </button>
        </div>

        <p class="footer">Powered by <span>Pollinations.ai</span> • Free & Unlimited</p>
    </div>

    <script>
        let currentImage = null;
        let currentStyle = '';

        // Style buttons
        document.querySelectorAll('.style-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentStyle = this.dataset.style;
            });
        });

        // Enter key
        document.getElementById('prompt').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') generateImage();
        });

        async function generateImage() {
            const prompt = document.getElementById('prompt').value.trim();
            if (!prompt) {
                const input = document.getElementById('prompt');
                input.style.borderColor = '#ff4444';
                setTimeout(() => input.style.borderColor = '', 1500);
                return;
            }

            const fullPrompt = currentStyle ? `${prompt}, ${currentStyle}` : prompt;
            const seed = Math.floor(Math.random() * 99999);
            const imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(fullPrompt)}?width=512&height=512&seed=${seed}&nologo=true`;

            const loadingOverlay = document.getElementById('loadingOverlay');
            const generatedImage = document.getElementById('generatedImage');
            const placeholder = document.getElementById('placeholder');
            const downloadBtn = document.getElementById('downloadBtn');
            const generateBtn = document.getElementById('generateBtn');

            // Show loading
            loadingOverlay.classList.add('show');
            generateBtn.disabled = true;
            generatedImage.style.display = 'none';
            placeholder.style.display = 'block';

            generatedImage.src = imageUrl;
            
            generatedImage.onload = function() {
                loadingOverlay.classList.remove('show');
                generatedImage.style.display = 'block';
                placeholder.style.display = 'none';
                downloadBtn.classList.add('visible');
                generateBtn.disabled = false;
                currentImage = imageUrl;
            };

            generatedImage.onerror = function() {
                loadingOverlay.classList.remove('show');
                generateBtn.disabled = false;
                alert('Failed to generate. Please try again.');
            };
        }

        async function downloadImage() {
            if (!currentImage) return;
            
            const btn = document.getElementById('downloadBtn');
            btn.textContent = 'Saving...';
            btn.disabled = true;
            
            try {
                const response = await fetch(currentImage);
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `dark-ai-${Date.now()}.png`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                btn.textContent = '✦ Saved! ✦';
            } catch (e) {
                window.open(currentImage, '_blank');
                btn.textContent = '⬇ Save Image';
            }
            
            setTimeout(() => {
                btn.textContent = '⬇ Save Image';
                btn.disabled = false;
            }, 2000);
        }
    </script>
</body>
</html>
